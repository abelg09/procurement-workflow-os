name: Manual Live Procurement Backup

on:
  workflow_dispatch:

jobs:
  export-live-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Resolve Supabase service role key
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY is not configured and SUPABASE_ACCESS_TOKEN/SUPABASE_PROJECT_REF fallback is unavailable."
            exit 1
          fi

          response="$(curl -fsS \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/api-keys?reveal=true")"

          resolved_key="$(node -e '
            const keys = JSON.parse(process.argv[1]);
            const serviceKey = keys.find((key) =>
              key.api_key &&
              (key.name === "service_role" ||
                key.name === "service_role key" ||
                key.name?.toLowerCase().includes("service"))
            )?.api_key;
            if (!serviceKey) {
              console.error("Supabase service_role API key was not returned by the Management API.");
              process.exit(1);
            }
            process.stdout.write(serviceKey);
          ' "$response")"

          echo "::add-mask::$resolved_key"
          echo "SUPABASE_SERVICE_ROLE_KEY=$resolved_key" >> "$GITHUB_ENV"

      - name: Export live app state backup
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          BACKUP_DIR: live-procurement-backup
        run: node scripts/export-live-backup.mjs

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-procurement-backup
          path: live-procurement-backup/
          if-no-files-found: error
