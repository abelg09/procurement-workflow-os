name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.6.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS: ${{ vars.NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS || secrets.NEXT_PUBLIC_ALLOWED_EMAIL_DOMAINS || 'sulmi.ai' }}
          NEXT_PUBLIC_ADMIN_EMAILS: ${{ vars.NEXT_PUBLIC_ADMIN_EMAILS || secrets.NEXT_PUBLIC_ADMIN_EMAILS }}
          NEXT_PUBLIC_SITE_BASE_PATH: ${{ vars.NEXT_PUBLIC_SITE_BASE_PATH || secrets.NEXT_PUBLIC_SITE_BASE_PATH }}
          GITHUB_PAGES_CUSTOM_DOMAIN: ${{ vars.GITHUB_PAGES_CUSTOM_DOMAIN || secrets.GITHUB_PAGES_CUSTOM_DOMAIN || 'procurement.sulmi.ai' }}
          NEXT_PUBLIC_GITHUB_PAGES_CUSTOM_DOMAIN: ${{ vars.GITHUB_PAGES_CUSTOM_DOMAIN || secrets.GITHUB_PAGES_CUSTOM_DOMAIN || 'procurement.sulmi.ai' }}
        run: pnpm build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
