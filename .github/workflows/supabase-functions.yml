name: Deploy Supabase Functions

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy procurement notification function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy procurement-notifications --project-ref "$SUPABASE_PROJECT_REF"

      - name: Resolve Supabase service role key
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY is not configured and SUPABASE_ACCESS_TOKEN/SUPABASE_PROJECT_REF fallback is unavailable."
            exit 1
          fi

          response="$(curl -fsS \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Accept: application/json" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/api-keys?reveal=true")"

          resolved_key="$(node -e '
            const keys = JSON.parse(process.argv[1]);
            const serviceKey = keys.find((key) =>
              key.api_key &&
              (key.name === "service_role" ||
                key.name === "service_role key" ||
                key.name?.toLowerCase().includes("service"))
            )?.api_key;
            if (!serviceKey) {
              console.error("Supabase service_role API key was not returned by the Management API.");
              process.exit(1);
            }
            process.stdout.write(serviceKey);
          ' "$response")"

          echo "::add-mask::$resolved_key"
          echo "SUPABASE_SERVICE_ROLE_KEY=$resolved_key" >> "$GITHUB_ENV"

      - name: Set optional notification secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL || vars.PROCUREMENT_DASHBOARD_URL || 'https://procurement.sulmi.ai/' }}
          PROCUREMENT_DASHBOARD_URL: ${{ vars.PROCUREMENT_DASHBOARD_URL || 'https://procurement.sulmi.ai/' }}
        run: |
          args=()
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && args+=("SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY")
          [ -n "$SLACK_BOT_TOKEN" ] && args+=("SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN")
          [ -n "$SLACK_WEBHOOK_URL" ] && args+=("SLACK_WEBHOOK_URL=$SLACK_WEBHOOK_URL")
          [ -n "$APP_BASE_URL" ] && args+=("APP_BASE_URL=$APP_BASE_URL")
          [ -n "$PROCUREMENT_DASHBOARD_URL" ] && args+=("PROCUREMENT_DASHBOARD_URL=$PROCUREMENT_DASHBOARD_URL")

          if [ ${#args[@]} -eq 0 ]; then
            echo "No optional notification secrets were provided."
            exit 0
          fi

          supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" "${args[@]}"
