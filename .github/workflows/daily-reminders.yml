name: Daily Procurement Reminders

on:
  schedule:
    # 3:00 PM Asia/Dubai is 11:00 AM UTC.
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Send reminder emails
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REMINDER_EMAIL_FROM: ${{ vars.REMINDER_EMAIL_FROM || secrets.REMINDER_EMAIL_FROM }}
          REMINDER_EMAIL_OVERRIDES: ${{ vars.REMINDER_EMAIL_OVERRIDES || secrets.REMINDER_EMAIL_OVERRIDES }}
          PROCUREMENT_DASHBOARD_URL: ${{ vars.PROCUREMENT_DASHBOARD_URL || 'https://procurement.sulmi.ai/' }}
        run: node scripts/send-daily-reminders.mjs
